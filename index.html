<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tignes 2026 – Tournée en fauteuil</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/jpg" href="assets/favicon-wheel.jpg">
  <link rel="apple-touch-icon" href="assets/favicon-wheel.jpg">
</head>

<body>
  <main class="app">
    <div class="hero-logo">
      <img src="assets/logo-tignes-2026.png" alt="Tignes 2026 - Tournée en fauteuil">
    </div>

    <p class="intro">
      Lance la roue et découvre une version de mon histoire. Sans doute.
    </p>

    <section class="wheel-zone" aria-label="Roue aléatoire">
      <div class="pointer" aria-hidden="true"></div>

      <div class="wheel-wrap">
        <div id="wheel" class="wheel" aria-live="polite"></div>
        <div class="hub">Tente<br>ta chance</div>
      </div>
    </section>

    <button id="spinButton" class="spin-button" type="button">Lancer la roue ✨</button>
    <p id="status" class="status" aria-live="polite"></p>

    <p class="details">Cette page a été bricolée depuis un téléphone portable dans un lit d'hôpital, merci pour votre compréhension !</p>
  </main>

  <script src="script.js"></script>
</body>

</html>
